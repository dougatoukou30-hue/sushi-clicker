<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>寿司クリッカー</title>

<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

<style>

body{
margin:0;
font-family:sans-serif;
text-align:center;
background:#fff5f0;
}

.screen{
display:none;
padding-top:60px;
}

.active{
display:block;
}

h1{
font-size:60px;
}

.startBtn{
font-size:35px;
padding:25px 60px;
background:#ffc857;
border:none;
border-radius:12px;
}

#sushi{
width:420px;
margin-top:40px;
touch-action:manipulation;
}

#menu{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:white;
border-top:2px solid #ccc;
}

#menu button{
flex:1;
font-size:25px;
padding:20px;
border:none;
background:white;
}

.shopBtn{
font-size:25px;
padding:20px;
margin:10px;
border:none;
border-radius:10px;
background:#ffd166;
width:80%;
}

</style>
</head>

<body>

<!-- タイトル -->
<div id="title" class="screen active">

<h1>
寿司<br>
クリッカー
</h1>

<button class="startBtn" id="startBtn">
ゲームスタート
</button>

<div style="position:absolute;right:10px;bottom:10px">
Ver.2.0
</div>

</div>

<!-- ゲーム -->
<div id="game" class="screen">

<h2>
🍣 寿司
</h2>

<div style="font-size:30px">
<span id="count">0</span>
</div>

<img id="sushi"
src="https://irasutofree.com//media/2022/10/14/00007193.original.png">

</div>

<!-- ショップ -->
<div id="shop" class="screen">

<h2>寿司ショップ</h2>

<div style="font-size:25px">
寿司: <span id="shopCount">0</span>
</div>

<button class="shopBtn" id="chefBtn">
寿司職人 +1自動<br>
50🍣
</button>

<button class="shopBtn" id="knifeBtn">
包丁強化 +1クリック<br>
100🍣
</button>

</div>

<!-- メニュー -->
<div id="menu" style="display:none">

<button id="menuGame">
寿司
</button>

<button id="menuShop">
ショップ
</button>

</div>

<script>

var sushi=0
var power=1
var auto=0

function show(id){

var screens=document.getElementsByClassName("screen")

for(var i=0;i<screens.length;i++){
screens[i].classList.remove("active")
}

document.getElementById(id).classList.add("active")

update()

}

function update(){

document.getElementById("count").innerHTML=Math.floor(sushi)
document.getElementById("shopCount").innerHTML=Math.floor(sushi)

}

function clickSushi(){

sushi+=power

update()

}

function buyChef(){

if(sushi<50){

alert("寿司が足りないよ")

return

}

sushi-=50

auto+=1

update()

}

function buyKnife(){

if(sushi<100){

alert("寿司が足りないよ")

return

}

sushi-=100

power+=1

update()

}

function startGame(){

show("game")

document.getElementById("menu").style.display="flex"

}

setInterval(function(){

sushi+=auto

update()

},1000)


// ボタンイベント

document.getElementById("startBtn").addEventListener("click",startGame)
document.getElementById("startBtn").addEventListener("touchstart",startGame)

document.getElementById("sushi").addEventListener("click",clickSushi)
document.getElementById("sushi").addEventListener("touchstart",clickSushi)

document.getElementById("chefBtn").addEventListener("click",buyChef)
document.getElementById("chefBtn").addEventListener("touchstart",buyChef)

document.getElementById("knifeBtn").addEventListener("click",buyKnife)
document.getElementById("knifeBtn").addEventListener("touchstart",buyKnife)

document.getElementById("menuGame").addEventListener("click",function(){
show("game")
})

document.getElementById("menuShop").addEventListener("click",function(){
show("shop")
})

</script>

</body>
</html>
