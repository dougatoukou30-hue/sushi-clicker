<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>寿司クリッカー</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>

body{
margin:0;
font-family:sans-serif;
background:#fff5f0;
text-align:center;
touch-action:manipulation;
overflow:hidden;
}

.screen{
display:none;
height:100vh;
overflow-y:auto;
padding-bottom:100px;
box-sizing:border-box;
}

.active{
display:block;
}

h1{
margin-top:20px;
font-size:52px;
}

#title h1{
margin-top:140px;
line-height:1.2;
}

.startBtn{
font-size:32px;
padding:20px 50px;
border:none;
border-radius:12px;
background:#ffcc80;
}

/* ステータス */

.stats{

font-size:28px;
line-height:1.7;

margin-top:10px;

}

/* 寿司位置修正 */

#sushiArea{

width:100%;

display:flex;
justify-content:center;
align-items:center;

margin-top:30px;
margin-bottom:120px;

}

/* 寿司サイズ */

#sushi{

width:320px;
max-width:70vw;

display:block;

transition:0.1s;

}

/* 下メニュー */

#menu{
position:fixed;
bottom:0;
left:0;

width:100%;
display:flex;

background:white;
border-top:2px solid #ddd;
z-index:999;
}

#menu button{
flex:1;
font-size:26px;
padding:20px;
border:none;
background:white;
}

/* ショップ */

.shopItem{
margin-bottom:35px;
}

.shopBtn{
font-size:20px;
padding:12px;
margin:5px;
border:none;
border-radius:10px;
background:#ffcc80;
}

/* セーブ表示 */

#saveText{
position:fixed;
top:10px;
right:10px;

background:rgba(0,0,0,0.7);
color:white;

padding:8px 12px;
border-radius:10px;

font-size:16px;

display:none;

z-index:1000;
}

</style>
</head>

<body>

<!-- セーブ通知 -->

<div id="saveText">
💾 セーブ完了
</div>

<!-- タイトル -->

<div id="title" class="screen active">

<h1>
寿司<br>
クリッカー
</h1>

<button class="startBtn" id="startBtn">
ゲームスタート
</button>

<div style="position:absolute; right:10px; bottom:10px;">
Ver.1.5
</div>

</div>

<!-- ゲーム -->

<div id="game" class="screen">

<h1>🍣寿司クリッカー</h1>

<div class="stats">

🍣寿司<br>
<span id="count">0</span>

<br><br>

👆クリック<br>
<span id="power">1</span>

<br><br>

⚡秒間<br>
<span id="auto">0</span>

</div>

<div id="sushiArea">

<img
id="sushi"
src="https://irasutofree.com//media/2022/10/14/00007193.original.png"
>

</div>

</div>

<!-- ショップ -->

<div id="shop" class="screen">

<h2>🏪寿司ショップ</h2>

<!-- 寿司職人 -->

<div class="shopItem">

<button class="shopBtn" onclick="buyChef(1)">
👨‍🍳寿司職人<br>
自動寿司 +1<br>
50🍣
</button>

<br>

<button class="shopBtn" onclick="buyChef(1)">×1</button>

<button class="shopBtn" onclick="buyChef(10)">×10</button>

<button class="shopBtn" onclick="buyChef(100)">×100</button>

<button class="shopBtn" onclick="buyChef('MAX')">MAX</button>

</div>

<!-- 包丁 -->

<div class="shopItem">

<button class="shopBtn" onclick="buyKnife(1)">
🔪包丁強化<br>
クリック +1<br>
100🍣
</button>

<br>

<button class="shopBtn" onclick="buyKnife(1)">×1</button>

<button class="shopBtn" onclick="buyKnife(10)">×10</button>

<button class="shopBtn" onclick="buyKnife(100)">×100</button>

<button class="shopBtn" onclick="buyKnife('MAX')">MAX</button>

</div>

</div>

<!-- 下メニュー -->

<div id="menu" style="display:none">

<button onclick="show('game')">
🍣寿司
</button>

<button onclick="show('shop')">
🏪ショップ
</button>

</div>

<script>

var sushi = 0
var power = 1
var auto = 0


// セーブ

function saveGame(){

var data = {

sushi:sushi,
power:power,
auto:auto

}

localStorage.setItem("sushiSave", JSON.stringify(data))

showSaveText()

}


// ロード

function loadGame(){

var data = localStorage.getItem("sushiSave")

if(data){

var save = JSON.parse(data)

sushi = save.sushi || 0
power = save.power || 1
auto = save.auto || 0

}

}


// セーブ表示

function showSaveText(){

var text = document.getElementById("saveText")

text.style.display = "block"

setTimeout(function(){

text.style.display = "none"

},1000)

}


// ゲーム開始

function startGame(){

show("game")

document.getElementById("menu").style.display="flex"

}


// 画面切替

function show(screen){

var screens = document.getElementsByClassName("screen")

for(var i=0;i<screens.length;i++){

screens[i].classList.remove("active")

}

document.getElementById(screen).classList.add("active")

update()

}


// 更新

function update(){

document.getElementById("count").innerText = Math.floor(sushi)

document.getElementById("power").innerText = power

document.getElementById("auto").innerText = auto

}


// 寿司クリック

function clickSushi(){

sushi += power

update()

// 揺れる演出

var sushiImg = document.getElementById("sushi")

sushiImg.style.transform = "scale(0.95) rotate(3deg)"

setTimeout(function(){

sushiImg.style.transform = "scale(1) rotate(0deg)"

},100)

}


// 寿司職人

function buyChef(amount){

if(amount=="MAX"){

amount = Math.floor(sushi / 50)

}

var price = 50 * amount

if(sushi < price || amount <= 0){

alert("寿司が足りないよ")

return

}

sushi -= price

auto += amount

update()

}


// 包丁

function buyKnife(amount){

if(amount=="MAX"){

amount = Math.floor(sushi / 100)

}

var price = 100 * amount

if(sushi < price || amount <= 0){

alert("寿司が足りないよ")

return

}

sushi -= price

power += amount

update()

}


// 自動寿司

setInterval(function(){

sushi += auto

update()

},1000)


// 自動セーブ

setInterval(function(){

saveGame()

},5000)


// WiiU対応

var sushiArea = document.getElementById("sushiArea")

sushiArea.addEventListener("click", clickSushi)
sushiArea.addEventListener("touchstart", clickSushi)
sushiArea.addEventListener("pointerdown", clickSushi)


// Spaceキー対応

document.addEventListener("keydown", function(event){

if(event.code === "Space"){

event.preventDefault()

clickSushi()

}

})


// スタートボタン

var startButton = document.getElementById("startBtn")

startButton.addEventListener("click", startGame)
startButton.addEventListener("touchstart", startGame)
startButton.addEventListener("pointerdown", startGame)


// ロード

loadGame()

update()

</script>

</body>
</html>
