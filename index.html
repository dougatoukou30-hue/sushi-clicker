<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>寿司クリッカー</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>

body{
margin:0;
font-family:sans-serif;
background:#fff5f0;
text-align:center;
touch-action: manipulation;
}

.screen{
display:none;
height:100vh;
}

.active{
display:block;
}

#title h1{
font-size:60px;
margin-top:150px;
}

.startBtn{
font-size:32px;
padding:20px 50px;
border:none;
border-radius:12px;
background:#ffcc80;
}

#sushi{
width:420px;
cursor:pointer;
margin-top:40px;
}

.stats{
font-size:22px;
margin-top:20px;
}

#menu{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:white;
border-top:2px solid #ddd;
}

#menu button{
flex:1;
font-size:22px;
padding:18px;
border:none;
background:white;
}

.shopBtn{
font-size:22px;
padding:15px;
margin:10px;
border-radius:10px;
border:none;
background:#ffcc80;
}

</style>
</head>

<body>

<!-- タイトル -->

<div id="title" class="screen active">

<h1>
寿司<br>
クリッカー
</h1>

<button class="startBtn" id="startBtn">
ゲームスタート
</button>

<div style="position:absolute; right:10px; bottom:10px;">
Ver.1.0
</div>

</div>


<!-- ゲーム -->

<div id="game" class="screen">

<h1>🍣寿司クリッカー</h1>

<div class="stats">

🍣寿司  
<span id="count">0</span>

<br>

👆クリック  
<span id="power">1</span>

<br>

⚡秒間  
<span id="auto">0</span>

</div>

<img
id="sushi"
src="https://irasutofree.com//media/2022/10/14/00007193.original.png"
>

</div>


<!-- ショップ -->

<div id="shop" class="screen">

<h2>寿司ショップ</h2>

<button class="shopBtn" onclick="buyChef()">
👨‍🍳寿司職人  
自動寿司 +1  
50🍣
</button>

<button class="shopBtn" onclick="buyKnife()">
🔪包丁強化  
クリック +1  
100🍣
</button>

</div>


<!-- メニュー -->

<div id="menu" style="display:none">

<button onclick="show('game')">
🍣寿司
</button>

<button onclick="show('shop')">
🏪ショップ
</button>

</div>


<script>

var sushi=0
var power=1
var auto=0


function startGame(){

show("game")

document.getElementById("menu").style.display="flex"

}


function show(screen){

var screens=document.getElementsByClassName("screen")

for(var i=0;i<screens.length;i++){

screens[i].classList.remove("active")

}

document.getElementById(screen).classList.add("active")

update()

}


function update(){

document.getElementById("count").innerText=Math.floor(sushi)

document.getElementById("power").innerText=power

document.getElementById("auto").innerText=auto

}


function clickSushi(){

sushi+=power

update()

}


function buyChef(){

if(sushi<50){

alert("寿司が足りないよ")

return

}

sushi-=50

auto++

update()

}


function buyKnife(){

if(sushi<100){

alert("寿司が足りないよ")

return

}

sushi-=100

power++

update()

}


setInterval(function(){

sushi+=auto

update()

},1000)


// WiiU対応クリック

var sushiImg=document.getElementById("sushi")

sushiImg.addEventListener("click",clickSushi)
sushiImg.addEventListener("touchstart",clickSushi)


// WiiUスタートボタン対応

var startButton=document.getElementById("startBtn")

startButton.addEventListener("click",startGame)
startButton.addEventListener("touchstart",startGame)

</script>

</body>
</html>
